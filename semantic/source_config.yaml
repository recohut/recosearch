# Source connection configuration (template).
#
# Declare each data source the server is allowed to reach. This file is the only
# connection authority — no connection details live in code.
#
# Secrets must be provided via environment variables using ${VAR_NAME} syntax.
# Copy .env.example to .env and fill in your values. Never commit real secrets.
#
# Non-secret fields (host, port, database, URLs) are safe to keep here.
#
# A complete, working example is in examples/novamart/source_config.yaml. To run
# that scenario instead of this template, set:
#   export RECOSEARCH_SEMANTIC_DIR=examples/novamart

sources: {}
