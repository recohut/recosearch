metrics:
  - id: metric:novashop:revenue_per_customer
    display_name: revenue per customer
    synonyms:
      - rpc
      - arpu
    collection_id: novashop_custom
    kind: derived
    formula: "metric:novashop:net_revenue / metric:novashop:unique_customers"
    grain: order
    filter_rules:
      - active
    allowed_dimension_ids:
      - dimension:novashop:customer_name
    version: "1.0.0"
    status: certified
