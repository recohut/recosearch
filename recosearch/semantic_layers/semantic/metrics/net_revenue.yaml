metrics:
  - id: metric:novashop:net_revenue
    display_name: net revenue
    synonyms:
      - net sales
    collection_id: novashop_custom
    kind: derived
    formula: "measure:novashop:total_amount - measure:novashop:refund_amount"
    grain: order
    filter_rules:
      - active
    allowed_dimension_ids:
      - dimension:novashop:order_status
      - dimension:novashop:product_category
      - dimension:novashop:customer_name
    version: "1.0.0"
    status: certified
